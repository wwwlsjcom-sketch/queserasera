<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>咨询报告</title>
  <style>
    :root {
      --ink:#111318; --muted:#5b6270; --line:#d7dce4; --paper:#f6f7f9;
      --white:#fff; --blue:#145cff; --deep:#06162f; --cyan:#20c7e6;
      --amber:#ffb000; --red:#c64036; --green:#168565;
      --cover-image:none;
      --sans:Arial,"Noto Sans SC","Microsoft YaHei",sans-serif;
      --serif:Georgia,"Times New Roman","Noto Serif SC","Songti SC",serif;
    }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--paper); color:var(--ink); font-family:var(--sans); line-height:1.56; }
    main, .cover { width:min(100%,960px); margin:0 auto; background:var(--white); box-shadow:0 24px 80px rgba(17,19,24,.12); }
    .cover { min-height:1120px; position:relative; overflow:hidden; background:var(--deep); color:var(--white); padding:84px 76px; display:flex; flex-direction:column; justify-content:space-between; }
    .cover.cover-image { background-image:var(--cover-image); background-position:center; background-size:cover; background-repeat:no-repeat; }
    .cover::before { content:""; position:absolute; inset:0; background:linear-gradient(90deg,rgba(4,13,27,.92) 0%,rgba(4,13,27,.76) 42%,rgba(4,13,27,.2) 78%),linear-gradient(180deg,rgba(4,13,27,.12),rgba(4,13,27,.5)); }
    .cover.cover-right::before { background:linear-gradient(270deg,rgba(4,13,27,.92) 0%,rgba(4,13,27,.76) 42%,rgba(4,13,27,.2) 78%),linear-gradient(180deg,rgba(4,13,27,.12),rgba(4,13,27,.5)); }
    .cover > * { position:relative; z-index:1; }
    .cover-copy { width:min(100%,720px); }
    .cover.cover-right .cover-copy { margin-left:auto; text-align:right; }
    .cover.cover-center .cover-copy { margin-inline:auto; text-align:center; }
    .kicker { font-size:13px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; opacity:.82; }
    h1,h2,h3 { margin:0; line-height:1.05; letter-spacing:0; }
    h1 { max-width:760px; font:700 clamp(54px,8vw,94px)/1.02 var(--serif); }
    .subtitle { max-width:700px; margin-top:28px; font-size:21px; color:rgba(255,255,255,.86); text-shadow:0 12px 30px rgba(0,0,0,.34); }
    .cover.cover-right .subtitle { margin-left:auto; }
    .cover-meta { display:grid; gap:14px; max-width:620px; }
    .cover-meta div { border-top:1px solid rgba(255,255,255,.25); padding-top:14px; color:rgba(255,255,255,.76); }
    .cover-meta strong { display:block; color:var(--white); font-size:16px; margin-bottom:6px; }
    main { counter-reset:exhibit; }
    .page { min-height:1080px; padding:76px; border-bottom:1px solid var(--line); }
    .section-head { display:grid; grid-template-columns:72px 1fr; gap:22px; margin-bottom:38px; }
    .section-no { color:var(--blue); font-size:30px; font-weight:800; }
    h2 { font:700 clamp(36px,5vw,60px)/1.08 var(--serif); }
    .dek { max-width:840px; margin-top:16px; color:#333842; font-size:20px; line-height:1.45; }
    .narrative { max-width:900px; margin-top:28px; color:#303640; font-size:16px; line-height:1.78; }
    .narrative p { margin:0 0 18px; }
    .grid-3 { display:grid; grid-template-columns:repeat(3,minmax(0,1fr)); gap:20px; }
    .insight { border-top:4px solid var(--blue); padding-top:16px; }
    .big-number { display:block; color:var(--blue); font:700 62px/1 var(--serif); }
    .evidence-grid { display:grid; grid-template-columns:repeat(2,minmax(0,1fr)); gap:16px; margin-top:28px; }
    .evidence-item { padding:16px; border-top:2px solid var(--ink); background:#f8fafc; }
    .evidence-item strong { display:block; margin-bottom:7px; font-size:13px; }
    .evidence-item span { display:block; color:#4d5664; font-size:12px; line-height:1.55; }
    .density-panel { margin-top:28px; display:grid; grid-template-columns:180px 1fr; gap:22px; padding:22px 24px; border-left:4px solid var(--blue); background:#f6f8fb; }
    .density-panel strong { color:var(--blue); text-transform:uppercase; font-size:12px; letter-spacing:.08em; }
    .density-panel p { margin:0; color:#303845; font-size:14px; line-height:1.7; }
    .chart-block { counter-increment:exhibit; margin-top:38px; padding:28px; border:1px solid var(--line); border-top:4px solid var(--ink); background:#fbfcfe; }
    .chart-block::before { content:"Exhibit " counter(exhibit); display:block; margin-bottom:8px; color:var(--blue); font-size:12px; font-weight:800; letter-spacing:.08em; text-transform:uppercase; }
    .chart-block h3 { font:700 clamp(24px,3vw,34px)/1.14 var(--serif); margin-bottom:8px; }
    .chart-caption { max-width:780px; margin:0 0 22px; color:var(--muted); font-size:13px; line-height:1.6; }
    .exhibit-svg { width:100%; height:auto; display:block; overflow:visible; font-family:var(--sans); }
    .axis-line { stroke:#7f8794; stroke-width:1; } .grid-line { stroke:#d7dce4; stroke-width:1; }
    .chart-label { fill:#1d2430; font-size:12px; } .chart-note { fill:#687181; font-size:11px; }
    .knowledge-map { display:grid; grid-template-columns:1fr minmax(190px,.9fr) 1fr; gap:22px; padding:30px; overflow:visible; background:linear-gradient(90deg,rgba(215,220,228,.58) 1px,transparent 1px) 0 0/44px 44px,linear-gradient(0deg,rgba(215,220,228,.58) 1px,transparent 1px) 0 0/44px 44px,#fff; }
    .map-column { display:grid; gap:18px; align-content:center; }
    .kg-node { padding:18px; border:2px solid var(--ink); background:#fff; box-shadow:8px 8px 0 rgba(20,92,255,.12); }
    .kg-node.core { background:var(--blue); color:#fff; border-color:var(--blue); }
    .dark-exhibit { margin-top:18px; padding:22px; background:#0b1b2a; color:#fff; }
    .diverging-chart { display:grid; gap:13px; margin-top:18px; }
    .diverging-row { display:grid; grid-template-columns:150px 1fr 1fr 42px; gap:8px; align-items:center; min-height:34px; font-size:12px; }
    .diverging-left,.diverging-right { height:18px; position:relative; }
    .diverging-left span,.diverging-right span { position:absolute; top:0; height:18px; }
    .diverging-left span { right:0; background:var(--deep); } .diverging-right span { left:0; background:#5ca9e8; }
    .table-wrap { overflow-x:auto; border-top:2px solid var(--ink); margin-top:28px; }
    table { width:100%; border-collapse:collapse; min-width:720px; font-size:13px; }
    th,td { padding:13px 12px; border-bottom:1px solid var(--line); text-align:left; vertical-align:top; }
    th { border-bottom:1px solid var(--ink); background:#fafafa; font-weight:800; }
    @media (max-width:920px){ .page{padding:48px 24px}.section-head,.grid-3,.knowledge-map,.evidence-grid,.density-panel{grid-template-columns:1fr}.diverging-row{grid-template-columns:1fr}.cover{min-height:920px;padding:48px 28px}.cover.cover-right .cover-copy{text-align:left;margin-left:0}.cover.cover-right .subtitle{margin-left:0} }
    @media print { @page{size:A4 portrait;margin:0} body{background:#fff} main,.cover{width:100%;box-shadow:none}.page,.cover{break-after:page;min-height:auto} }
  </style>
</head>
<body>
  <section class="cover cover-image cover-left" style="--cover-image:url('data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 1200 1600%22%3E%3Crect width=%221200%22 height=%221600%22 fill=%22%2306162f%22/%3E%3Cg fill=%22none%22 stroke=%22%23145cff%22 stroke-opacity=%220.35%22%3E%3Cpath d=%22M720 120h260v260H720zM840 380v360M980 300v520M650 760h420M760 900h320%22/%3E%3C/g%3E%3Cg fill=%22%2320c7e6%22 fill-opacity=%220.55%22%3E%3Ccircle cx=%22840%22 cy=%22380%22 r=%226%22/%3E%3Ccircle cx=%22980%22 cy=%22820%22 r=%226%22/%3E%3Ccircle cx=%22760%22 cy=%22900%22 r=%226%22/%3E%3C/g%3E%3C/svg%3E');">
    <div class="cover-copy">
      <p class="kicker">Executive report / 咨询报告</p>
      <h1><!-- 报告标题 / Report title --></h1>
      <p class="subtitle"><!-- 报告副标题：一句话说明主题、范围和用途 --></p>
    </div>
    <div class="cover-meta">
      <div><strong>核心判断</strong><!-- 2-3 行核心结论 --></div>
      <div><strong>决策背景</strong><!-- 说明报告面向的决策场景 --></div>
      <div><strong>建议关注</strong><!-- 说明最需要关注的议题 --></div>
    </div>
  </section>
  <main>
    <section class="page">
      <div class="section-head">
        <div class="section-no">01</div>
        <div><h2>执行摘要</h2><p class="dek"><!-- 结论先行的摘要导语 --></p></div>
      </div>
      <div class="narrative"><p><!-- 正文分析段落：说明结论、依据、管理层含义和限制 --></p></div>
      <div class="evidence-grid">
        <div class="evidence-item"><strong><!-- 证据维度 --></strong><span><!-- 来源、口径、证据质量或待验证问题 --></span></div>
        <div class="evidence-item"><strong><!-- 证据维度 --></strong><span><!-- 来源、口径、证据质量或待验证问题 --></span></div>
      </div>
      <div class="chart-block">
        <h3><!-- 结论式 Exhibit 标题 --></h3>
        <p class="chart-caption"><!-- 图表说明、数据口径、假设或来源 --></p>
        <svg class="exhibit-svg" viewBox="0 0 760 320" role="img" aria-label="图表"></svg>
      </div>
      <div class="density-panel">
        <strong><!-- Management implication / Evidence gap / Watch point --></strong>
        <p><!-- 解释该页 Exhibit 和证据对决策的含义，补足页面信息密度。 --></p>
      </div>
    </section>
  </main>
</body>
</html>
